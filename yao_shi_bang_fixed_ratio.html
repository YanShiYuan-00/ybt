    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #e5e7eb; /* 桌面端背景色 */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* 模拟手机容器 */
        #root {
            width: 100%;
            max-width: 430px; /* 模拟 iPhone Pro Max 宽度 */
            height: 90vh; /* 固定高度，模拟手机屏幕 */
            max-height: 932px;
            background: #fff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
            border-radius: 40px; /* 圆角模拟手机外形 */
            border: 8px solid #1f2937; /* 模拟手机边框 */
        }
        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 动画 */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>

                        <div className="absolute right-2 bottom-2 w-32 h-32 z-0 opacity-80">
                            <div className="relative w-full h-full">

                <div className="px-4 py-8 grid grid-cols-3 gap-y-10">
                    <GridItem

                        icon={<div className="relative flex items-center justify-center"><svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg><span className="absolute text-[10px] font-bold text-white mt-1">保</span></div>}
                    />
                    <GridItem label="非药馆" bgColor="bg-[#5D99FF]" icon={<svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>} />
                    <GridItem label="药采购" bgColor="bg-[#FF6B6B]" icon={<div className="relative flex items-center justify-center"><svg className="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg><span className="absolute text-[8px] font-bold text-white -mt-1">药</span></div>} />
                    <GridItem label="全球购" bgColor="bg-[#A855F7]" icon={<div className="relative flex items-center justify-center"><svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg><span className="absolute text-[8px] font-bold text-white mt-4">进口</span></div>} />
                    <GridItem label="个人中心" bgColor="bg-[#FB923C]" icon={<svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>} />
                    <GridItem label="中药馆" bgColor="bg-[#84CC16]" icon={<svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z" /></svg>} />
                    <GridItem label="诊所优选" bgColor="bg-[#22C55E]" icon={<div className="relative flex items-center justify-center"><svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg><span className="absolute text-[10px] font-bold text-white mt-1">+</span></div>} />
                    <GridItem label="光谱小屋" bgColor="bg-[#3B82F6]" icon={<div className="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center"><div className="w-4 h-4 bg-white rounded-full shadow-inner"></div></div>} />
                    <GridItem label="我的消息" bgColor="bg-[#FACC15]" icon={<div className="relative flex items-center justify-center"><svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg><span className="absolute text-[10px] font-bold text-white -mt-1">...</span></div>} />
                </div>
            </div>
        );

        const MedicalInsuranceSearch = ({ onBack, onBuy, isMember, onShowMembershipPopup, membershipExpiry }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [searchClickCount, setSearchClickCount] = useState(0);
            const [showSuggestions, setShowSuggestions] = useState(false);

            const filteredDrugs = useMemo(() => {
                if (!searchTerm) return MOCK_DRUGS.filter(d => d.hasListedPrice).slice(0, 10);
                return MOCK_DRUGS.filter(d => d.name.includes(searchTerm));
            }, [searchTerm]);

            const suggestions = useMemo(() => {
                if (!searchTerm) return [];
                return MOCK_DRUGS.filter(d => d.name.includes(searchTerm)).slice(0, 5);
            }, [searchTerm]);

            return (
                <div className="flex flex-col h-full bg-[#f7f8fa]">
                    <div className="bg-white px-4 py-3 flex items-center shadow-sm sticky top-0 z-20">
                        <button onClick={onBack} className="p-1"><svg className="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" /></svg></button>
                        <div className="flex-1 text-center font-bold text-orange-600 text-lg">医保通</div>
                        <div className="w-8"></div>
                    </div>
                    {membershipExpiry && (
                        <div className="bg-orange-50 px-4 py-2 flex items-center justify-between border-b border-orange-100">
                            <span className="text-[11px] text-orange-700 font-medium">会员有效期至：{membershipExpiry}</span>
                            <span className="text-[10px] text-orange-400">尊享权益中</span>
                        </div>
                    )}
                    <div className="bg-white px-4 py-4 flex items-center gap-3">
                        <button className="h-10 w-10 flex items-center justify-center text-gray-500"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.8" d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M7 12h10" /></svg></button>
                        <div className="flex-1 h-10 relative">
                            <input 
                                type="text" placeholder="通用名/医保编码/批准文号" 
                                className="w-full h-full bg-gray-100 rounded-full pl-10 pr-4 text-sm focus:outline-none"
                                value={searchTerm}
                                onChange={(e) => { setSearchTerm(e.target.value); setShowSuggestions(true); }}
                                onClick={() => {
                                    if (!isMember) {
                                        const nextCount = searchClickCount + 1;
                                        setSearchClickCount(nextCount);
                                        if (nextCount >= 2) {
                                            onShowMembershipPopup();
                                        }
                                    }
                                    setShowSuggestions(true);
                                }}
                            />
                            <svg className="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                            {showSuggestions && suggestions.length > 0 && (
                                <div className="absolute top-full left-0 right-0 mt-2 bg-white rounded-xl shadow-2xl z-50 border border-gray-100 overflow-hidden">
                                    {suggestions.map(s => (
                                        <div key={s.id} className="px-4 py-3 border-b last:border-0 text-sm hover:bg-orange-50" onClick={() => { setSearchTerm(s.name); setShowSuggestions(false); }}>{s.name}</div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto px-2 py-3 space-y-3 no-scrollbar">

                            <div key={drug.id} className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 active:bg-gray-50" onClick={() => onBuy(drug)}>

                                </div>
                                <div className="text-[13px] text-gray-500 space-y-1.5">
                                    <p>医保编码：<span className="text-gray-400 font-mono">{drug.insuranceCode}</span></p>
                                    <p>规格：<span className="text-gray-700">{drug.spec}</span></p>
                                    <p>企业：<span className="text-blue-500">{drug.manufacturer}</span></p>
                                    <p className="flex items-center">最低零售价：<span className="text-red-500 font-bold text-base">¥{drug.listedPrice.toFixed(2)}</span></p>
                                </div>
                                <div className="mt-4 flex justify-between items-center">
                                    <span className="text-orange-500 font-bold text-sm">参考毛利率：<span className="text-xl">{(drug.margin * 100).toFixed(0)}%</span></span>

                                </div>
                            </div>
                        ))}

        };

        const DrugSearchList = ({ searchTerm, targetPrice, onBack, onSelectProduct, onAddToCart }) => {

                { id: 'd2', name: `【首推】 以岭 ${searchTerm} 0.35g*24粒`, manufacturer: '石家庄以岭药业股份有限公司', price: 18.80, discountPrice: 18.23, expiry: '2023-01-28', moq: '1盒起购', shipping: '1000免邮', store: '药利达旗舰店', image: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=400' }
            ];
            return (
                <div className="flex flex-col h-full bg-white">
                    <div className="px-4 py-2 flex items-center gap-3 border-b">
                        <button onClick={onBack}><svg className="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" /></svg></button>
                        <div className="flex-1 bg-gray-100 rounded-full h-9 flex items-center px-4 text-sm font-medium">{searchTerm}</div>
                        <div className="flex gap-3 items-center">
                            <svg className="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                            <svg className="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto bg-gray-50 p-2 space-y-2 no-scrollbar">
                        {results.map(item => (
                            <div key={item.id} className="flex p-4 bg-white rounded-xl shadow-sm" onClick={() => onSelectProduct(item)}>
                                <div className="relative w-24 h-24 shrink-0">
                                    <img src={item.image} className="w-full h-full object-cover rounded-lg" />
                                    <div className="absolute top-0 left-0 bg-red-400 text-white text-[8px] px-1 rounded-br">近效期</div>
                                </div>
                                <div className="ml-3 flex-1 flex flex-col justify-between">
                                    <div>
                                        <h3 className="text-sm font-bold line-clamp-1">{item.name}</h3>
                                        <div className="text-[10px] text-gray-400 mt-1">有效期至 {item.expiry}</div>
                                    </div>
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <div className="text-red-600 font-bold text-lg">¥{item.price.toFixed(2)}</div>
                                            <div className="text-orange-500 text-[10px]">折合约¥{item.discountPrice.toFixed(2)}</div>
                                        </div>
                                        <button className="w-8 h-8 bg-orange-600 rounded-full text-white flex items-center justify-center font-bold" onClick={(e) => { e.stopPropagation(); onAddToCart(item); }}>+</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ProductDetail = ({ drug, onBack }) => (
            <div className="flex flex-col h-full bg-[#f7f8fa] overflow-y-auto no-scrollbar relative">
                <div className="absolute top-4 left-4 right-4 z-10 flex justify-between">
                    <button onClick={onBack} className="w-9 h-9 bg-black/20 rounded-full flex items-center justify-center text-white backdrop-blur-sm"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7" /></svg></button>
                    <div className="flex gap-2">
                        <button className="w-9 h-9 bg-black/20 rounded-full flex items-center justify-center text-white backdrop-blur-sm"><svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.112-1.758l-4.94-2.47a3.01 3.01 0 000-1.413l4.94-2.47A2.99 2.99 0 0015 8z" /></svg></button>
                    </div>
                </div>
                <div className="relative aspect-[4/3] bg-gray-200">
                    <img src={drug.image || 'https://picsum.photos/seed/detail/800/600'} className="w-full h-full object-cover" />
                    <div className="absolute bottom-6 left-0 bg-red-600 text-white px-6 py-2 rounded-r-full font-bold text-lg">厂牌优选</div>
                </div>
                <div className="bg-white p-4 shadow-sm">
                    <div className="flex justify-between items-baseline mb-2">
                        <div className="flex items-baseline gap-1"><span className="text-orange-600 text-2xl font-black">7.45</span><span className="text-gray-400 text-xs">元/盒</span></div>
                        <span className="text-gray-500 text-xs">2盒起购</span>
                    </div>
                    <h1 className="text-lg font-bold text-gray-900">{drug.name}</h1>
                </div>
                <div className="bg-white p-4 mt-2 mb-20 space-y-4">
                    <div className="flex gap-2"><span className="bg-green-500 text-white text-[10px] px-2 py-0.5 rounded">甲类医保</span></div>
                    <div className="space-y-3 text-sm">
                        <div className="flex"><span className="w-24 text-gray-400">商品名称</span><span className="text-gray-800 font-medium">感冒灵颗粒 10g*9袋</span></div>
                        <div className="flex"><span className="w-24 text-gray-400">生产厂家</span><span className="text-gray-800 font-medium">{drug.manufacturer}</span></div>
                    </div>
                </div>
                <div className="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto p-4 bg-white border-t flex gap-4">
                    <div className="flex gap-4 px-2"><div className="flex flex-col items-center"><svg className="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg><span className="text-[10px] text-gray-500">购物车</span></div></div>
                    <button className="flex-1 bg-orange-500 text-white font-bold py-3 rounded-full shadow-lg">加入购物车</button>
                </div>
            </div>
        );

        const CartActionDrawer = ({ drug, onClose, onConfirm }) => (
            <div className="fixed inset-0 z-[100] flex flex-col justify-end">
                <div className="absolute inset-0 bg-black/60 animate-fade-in" onClick={onClose}></div>
                <div className="relative bg-white rounded-t-3xl p-4 pb-8 animate-slide-up">
                    <div className="flex gap-3 mb-6">
                        <div className="w-24 h-24 bg-gray-50 rounded-xl overflow-hidden relative">
                            <img src={drug.image} className="w-full h-full object-cover" />
                            <div className="absolute top-0 left-0 bg-green-500 text-white text-[8px] px-1 rounded-br">甲类医保</div>
                        </div>
                        <div className="flex-1">
                            <h3 className="text-sm font-bold text-gray-900 line-clamp-2">{drug.name}</h3>
                            <div className="mt-2 text-orange-600 text-xl font-black">¥{drug.price.toFixed(2)}</div>
                            <div className="mt-1 flex gap-3 text-[10px] text-gray-400"><span>零售价: ¥12.5</span><span className="text-green-600 font-bold">毛利: 40.4%</span></div>
                            <div className="mt-2 flex gap-1">
                                <span className="bg-red-50 text-red-500 text-[8px] px-1 rounded">近效期药品</span>
                                <span className="bg-red-50 text-red-600 text-[8px] px-1 rounded">！限定报销条件</span>
                            </div>
                        </div>
                    </div>
                    <div className="space-y-4 mb-8">
                        <div className="flex justify-between items-center text-xs"><span className="text-gray-400">有效期至</span><span className="text-orange-600 font-bold">{drug.expiry}</span></div>
                        <div className="flex justify-between items-center text-xs"><span className="text-gray-400">购买数量</span><div className="flex items-center border rounded h-8"><button className="px-3">-</button><span className="px-4 font-bold">1</span><button className="px-3 text-orange-600">+</button></div></div>
                    </div>
                    <button onClick={onConfirm} className="w-full bg-orange-500 text-white font-bold py-4 rounded-2xl shadow-lg">确认加入购物车</button>
                </div>
            </div>
        );

        // --- 3. 主应用 (App) ---

        const App = () => {
            const [page, setPage] = useState('home');
            const [searchDrug, setSearchDrug] = useState(null);
            const [selectedDrug, setSelectedDrug] = useState(null);
            const [isMember, setIsMember] = useState(false);
            const [showPopup, setShowPopup] = useState(false);
            const [showDrawer, setShowDrawer] = useState(false);
            const [membershipExpiry, setMembershipExpiry] = useState(null);

            const handlePaymentSuccess = () => {
                setIsMember(true);
                setMembershipExpiry('2026-04-02');
                setPage('insurance');
            };

            return (
                <div className="relative h-full overflow-hidden">
                    {page === 'home' && <YaoShiBangHome onEntryClick={() => setPage('insurance')} />}
                    {page === 'insurance' && (
                        <MedicalInsuranceSearch 
                            onBack={() => setPage('home')} 
                            onBuy={(d) => { setSearchDrug(d); setPage('searchList'); }}
                            isMember={isMember}
                            membershipExpiry={membershipExpiry}
                            onShowMembershipPopup={() => setShowPopup(true)}
                        />
                    )}
                    {page === 'searchList' && (
                        <DrugSearchList 
                            searchTerm={searchDrug?.name} 
                            targetPrice={searchDrug?.lowestPrice}
                            onBack={() => setPage('insurance')}
                            onSelectProduct={(d) => { setSelectedDrug(d); setPage('detail'); }}
                            onAddToCart={(d) => { setSelectedDrug(d); setShowDrawer(true); }}
                        />
                    )}
                    {page === 'detail' && (
                        <ProductDetail drug={selectedDrug} onBack={() => setPage('searchList')} />
                    )}

                    {/* 会员弹窗 */}
                    {showPopup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setShowPopup(false)}></div>
                            <div className="bg-white rounded-3xl w-full max-w-sm relative z-10 overflow-hidden shadow-2xl animate-slide-up">
                                <div className="bg-orange-500 p-8 text-center text-white">
                                    <h3 className="text-2xl font-bold mb-2">您还不是会员</h3>
                                    <p className="text-orange-100 text-sm">开通会员解锁全部功能</p>
                                </div>
                                <div className="p-6 space-y-6">
                                    <div className="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                        <div className="flex justify-between mb-2 text-xs text-gray-500"><span>当前采购额</span><span>¥15,680</span></div>
                                        <div className="w-full bg-gray-200 h-2 rounded-full"><div className="bg-orange-500 h-2 rounded-full w-[52%]"></div></div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={() => setShowPopup(false)} className="flex-1 py-3 rounded-xl border font-bold text-sm">再想想</button>
                                        <button onClick={() => { handlePaymentSuccess(); setShowPopup(false); }} className="flex-1 py-3 rounded-xl bg-orange-500 text-white font-bold text-sm">立即开通</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 购物车抽屉 */}
                    {showDrawer && (
                        <CartActionDrawer 
                            drug={selectedDrug} 
                            onClose={() => setShowDrawer(false)} 
                            onConfirm={() => { alert('已加入购物车'); setShowDrawer(false); }} 
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
